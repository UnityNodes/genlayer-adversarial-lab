networks:
  default: localnet
  localnet:
    url: http://127.0.0.1:4000/api
    leader_only: false
  studionet: {}
  # Testnet deploys go through the `genlayer` CLI (see deploy/NOTES.md), not gltest:
  # the pinned genlayer-py client cannot decode the current testnet consensus contract.
  # To target testnet with gltest once the client catches up, add e.g.:
  #   testnet_asimov:
  #     accounts: [${ACCOUNT_PRIVATE_KEY_1}]
  #     from: ${ACCOUNT_PRIVATE_KEY_1}
paths:
  contracts: contracts
  artifacts: artifacts
environment: .env
